# Wii Menu Theme Configuration\n# Colors are specified as RGBA: r,g,b,a\n\nname=Default (Wii-like)\n\n# Background color (light blue, like Wii menu)\nbackground=240,244,255,255\n\n# Channel box colors\nchannel_bg=255,255,255,220\nchannel_selected=100,180,255,255\nchannel_border=180,200,230,255\n\n# Banner colors\nbanner_bg=220,240,255,240\n\n# Text colors\ntext_primary=30,30,30,255\ntext_secondary=100,100,120,255\n\n# Accent color (highlights)\naccent=50,140,255,255\n\n# Overlay (for semi-transparent effects)\noverlay=0,0,0,120\n\n# Sounds directory (for theme-specific sounds)\nsounds_dir=sounds/\n